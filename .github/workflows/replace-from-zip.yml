name: Replace Repo Contents From Zip

on:
  workflow_dispatch:
    inputs:
      zip_path:
        description: "مسیر فایل zip داخل ریپو (مثلاً replace.zip یا folder/backup.zip)"
        required: true
        default: "replace.zip"
      keep_workflows:
        description: "پوشه‌ی .github (ورک‌فلوها) دست‌نخورده بمونه؟"
        type: boolean
        required: true
        default: true
      commit_message:
        description: "متن Commit"
        required: false
        default: "Replace repo contents from zip"

jobs:
  replace:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: چک‌اوت
        uses: actions/checkout@v4

      - name: بررسی وجود فایل zip
        run: |
          if [ ! -f "${{ inputs.zip_path }}" ]; then
            echo "فایل zip پیدا نشد: ${{ inputs.zip_path }}"
            echo "فایل‌های ریشه‌ی ریپو:"
            ls -la
            exit 1
          fi

      - name: استخراج zip در یه پوشه‌ی موقت
        run: |
          rm -rf /tmp/extracted
          mkdir -p /tmp/extracted
          unzip -o "${{ inputs.zip_path }}" -d /tmp/extracted

          # اگه zip فقط شامل یه پوشه‌ی تکی باشه (رایج‌ترین حالت zip گرفتن از یه پوشه)،
          # محتوای همون پوشه رو به‌عنوان ریشه در نظر می‌گیریم، نه خودِ پوشه رو.
          entries=(/tmp/extracted/*)
          if [ "${#entries[@]}" -eq 1 ] && [ -d "${entries[0]}" ]; then
            mkdir -p /tmp/final
            cp -r "${entries[0]}/." /tmp/final/
          else
            mkdir -p /tmp/final
            cp -r /tmp/extracted/. /tmp/final/
          fi

      - name: پاک‌کردن محتوای فعلی ریپو
        run: |
          shopt -s extglob dotglob
          if [ "${{ inputs.keep_workflows }}" = "true" ]; then
            for item in *; do
              if [ "$item" = ".github" ] || [ "$item" = ".git" ]; then
                continue
              fi
              rm -rf "$item"
            done
          else
            for item in *; do
              if [ "$item" = ".git" ]; then
                continue
              fi
              rm -rf "$item"
            done
          fi

      - name: کپی محتوای جدید از zip
        run: |
          shopt -s dotglob
          cp -r /tmp/final/* . 2>/dev/null || true
          cp -r /tmp/final/.[!.]* . 2>/dev/null || true

      - name: حذف خودِ فایل zip از ریپو (اگه داخل کپی جدید بازم موجود بود)
        run: rm -f "${{ inputs.zip_path }}"

      - name: نمایش تغییرات
        run: |
          echo "محتوای نهایی ریشه‌ی ریپو:"
          ls -la

      - name: Commit و Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "هیچ تغییری برای commit نبود."
          else
            git commit -m "${{ inputs.commit_message }}"
            git push
          fi
